<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Carrito</title>
    <link rel="icon" type="image/png" href="../img/cherie-cat-isotipo.png" />
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a href="../index.html"
          ><img src="../img/logo.png" alt="logo-tienda-cherie-desings"
        /></a>
      </div>
      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html" class="link-color-tres">Inicio</a>
          </li>
          <li>
            <a href="./contacto.html" class="link-color-dos">Contacto</a>
          </li>
          <li>
            <a href="./carrito.html" class="link-color-uno">
              🛒 <span id="contador-carrito">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-carrito">
      <h1 class="titulo-contacto text-secondary">Carrito de compras</h1>

      <div class="carrito-layout">
        <section id="contenedor-carrito" class="contenedor-carrito"></section>

        <aside class="resumen-carrito">
          <h2 class="titulo-resumen">Resumen</h2>
          <p class="resumen-total">
            Total: <strong id="total-carrito">$0</strong>
          </p>
          <button class="btn bg-color text-dark btn-pagar">Pagar</button>
          <div id="acciones-carrito" class="acciones-carrito"></div>
        </aside>
      </div>
    </main>
    <footer>
      <p>Estefania Almiron | Talento Tech - FrontEnd JS | 2026</p>
      <nav>
        <ul class="footer-list">
          <li>
            <a href="https://web.whatsapp.com/" target="_blank">
              <img src="../img/whatsapp.png" alt="logo-whatsapp" />
            </a>
          </li>
          <li>
            <a href="https://www.instagram.com/" target="_blank">
              <img src="../img/instagram.png" alt="logo-instagram" />
            </a>
          </li>
        </ul>
      </nav>
    </footer>

    <script type="module" src="../js/carrito.js"></script>
  </body>
</html>
